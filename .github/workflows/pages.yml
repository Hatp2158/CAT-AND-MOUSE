name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A04805: ${{ secrets.A04805 }}
          BB0EFA: ${{ secrets.BB0EFA }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A04805', '')
          bm = os.environ.get('BB0EFA', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 5a6f70d9fea961495eabdaa0a0d2a2741d3d21bdd8b61b -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 4d3449f668b2a2083bbda4058cdaa408f061bde3da8423b2 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
